name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact version to publish (for example 0.1.1)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Validate version
        id: validate
        shell: bash
        run: |
          VERSION="$(echo "${{ inputs.version }}" | xargs)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be plain semver, for example 0.1.1" >&2
            exit 1
          fi
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally" >&2
            exit 1
          fi
          if [ -n "$(git ls-remote --tags origin "refs/tags/$TAG")" ]; then
            echo "Tag $TAG already exists on origin" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        env:
          # @extension.dev/core is npm-restricted until the public flip; the
          # package .npmrc resolves ${NPM_TOKEN} for the install.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm compile

      - name: Test
        run: pnpm test

      - name: Read package metadata
        id: meta
        shell: bash
        run: |
          echo "name=$(node -p 'require("./package.json").name')" >> "$GITHUB_OUTPUT"
          echo "publish_access=$(node -p 'require("./package.json").publishConfig?.access || "public"')" >> "$GITHUB_OUTPUT"

      - name: Check published version
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG="${{ steps.meta.outputs.name }}"
          VER="${{ steps.validate.outputs.version }}"
          if npm view "$PKG@$VER" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "$PKG@$VER is already published" >&2
            exit 1
          fi

      - name: Update package version
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=process.env.VERSION;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and tag release
        env:
          VERSION: ${{ steps.validate.outputs.version }}
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          git add package.json pnpm-lock.yaml
          if ! git diff --cached --quiet; then
            git commit -m "release: v$VERSION"
          fi
          git tag "$TAG"
          git push
          git push origin "$TAG"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is missing." >&2
            exit 1
          fi
          npm publish --access ${{ steps.meta.outputs.publish_access }} --tag latest --no-git-checks --ignore-scripts
