name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  # Engine canaries move without MCP commits — without a nightly run, a skew
  # regression only surfaces on the next unrelated PR.
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  # Version-skew matrix: extension_build runs extension-develop in-process and
  # the act tools spawn the pinned CLI, so one engine version is one blind
  # spot. Cells: canary (the next stable), latest stable (what users get
  # today), and the vendored floor (the npx-pin fallback for projects with no
  # local install). Deduped when they coincide right after a release. Every
  # cell is required — a red canary cell is this workflow doing its job.
  engines:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve engine versions
        id: set
        run: |
          CANARY=$(npm view extension-develop@canary version)
          STABLE=$(npm view extension-develop version)
          FLOOR=$(node -p "require('./package.json').dependencies['extension-develop'].replace(/^[~^]/,'')")
          echo "canary=$CANARY stable=$STABLE floor=$FLOOR"
          node -e '
            const cells = [
              ["canary", process.argv[1]],
              ["stable", process.argv[2]],
              ["floor", process.argv[3]],
            ];
            const seen = new Set();
            const include = [];
            for (const [name, version] of cells) {
              if (seen.has(version)) continue;
              seen.add(version);
              include.push({name, version});
            }
            console.log("matrix=" + JSON.stringify({include}));
          ' "$CANARY" "$STABLE" "$FLOOR" >> "$GITHUB_OUTPUT"

  verify:
    needs: engines
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.engines.outputs.matrix) }}
    name: verify (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Pin engine (${{ matrix.name }} = ${{ matrix.version }})
        run: pnpm add "extension-develop@${{ matrix.version }}"

      - name: Build
        run: pnpm compile

      - name: Test
        env:
          # The real-CLI smoke exercises the npx pinned path — nightly only,
          # to keep PR cells fast.
          RUN_CLI_SMOKE: ${{ github.event_name == 'schedule' && '1' || '' }}
          EXTENSION_MCP_CLI_VERSION: ${{ matrix.version }}
        run: pnpm test
