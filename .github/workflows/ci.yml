name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        env:
          # @extension.dev/core is npm-restricted until the public flip; the
          # package .npmrc resolves ${NPM_TOKEN} for the install.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm compile

      - name: Test
        run: pnpm test
